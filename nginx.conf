
events {
    multi_accept on;
    worker_connections 4096;
}

http {

    server {
        listen 80;
        server_name localhost;
        include /etc/nginx/mime.types;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location ^~ /api/ {
            add_header 'Access-Control-Allow-Origin' '*' always;

            # Se o seu servidor de API não estiver lidando com requisições OPTIONS (preflight)
            # você pode adicionar o seguinte para respondê-las diretamente no Nginx.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass https://joylessly-slang-confused.ngrok-free.dev/;
            proxy_ssl_server_name on;
            proxy_ssl_name joylessly-slang-confused.ngrok-free.dev;

            proxy_http_version 1.1;
            proxy_set_header Host joylessly-slang-confused.ngrok-free.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header ngrok-skip-browser-warning 69420;
        }
    }
}